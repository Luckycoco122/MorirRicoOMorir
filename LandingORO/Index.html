<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morir Rico o Morir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
 
<!-- Grain overlay -->
<div class="grain"></div>
 
<!-- Corner decorations -->
<div class="corner corner-tl">
  <svg viewBox="0 0 60 60" fill="none" stroke="#C9A84C" stroke-width="1">
    <line x1="0" y1="30" x2="30" y2="30"/>
    <line x1="30" y1="0" x2="30" y2="30"/>
    <rect x="25" y="25" width="10" height="10"/>
  </svg>
</div>
<div class="corner corner-tr">
  <svg viewBox="0 0 60 60" fill="none" stroke="#C9A84C" stroke-width="1">
    <line x1="0" y1="30" x2="30" y2="30"/>
    <line x1="30" y1="0" x2="30" y2="30"/>
    <rect x="25" y="25" width="10" height="10"/>
  </svg>
</div>
<div class="corner corner-bl">
  <svg viewBox="0 0 60 60" fill="none" stroke="#C9A84C" stroke-width="1">
    <line x1="0" y1="30" x2="30" y2="30"/>
    <line x1="30" y1="0" x2="30" y2="30"/>
    <rect x="25" y="25" width="10" height="10"/>
  </svg>
</div>
<div class="corner corner-br">
  <svg viewBox="0 0 60 60" fill="none" stroke="#C9A84C" stroke-width="1">
    <line x1="0" y1="30" x2="30" y2="30"/>
    <line x1="30" y1="0" x2="30" y2="30"/>
    <rect x="25" y="25" width="10" height="10"/>
  </svg>
</div>
 
<!-- Vertical lines -->
<div class="vline vline-left"></div>
<div class="vline vline-right"></div>
 
<!-- Hero -->
<div class="hero">
  <div class="hero-title">MORIR RICO</div>
  <div class="hero-or">o morir</div>
  <div class="hero-title">INTENTANDO</div>
  <div class="hero-sub">Únete · Aprende · Construye · Escala</div>
</div>
 
<!-- Scrolling columns -->
<div class="scroll-stage">
  <div class="scroll-col left">
    <div class="scroll-col-inner" id="col-left"></div>
  </div>
  <div class="scroll-col center">
    <div class="scroll-col-inner" id="col-center"></div>
  </div>
  <div class="scroll-col right">
    <div class="scroll-col-inner" id="col-right"></div>
  </div>
</div>
 
<!-- Ticker -->
<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>
 
<script src="main.js"></script>
</body>
</html>
